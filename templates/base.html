<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{% block title %}¡Mis 15 años!{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <!-- Seccion Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <!-- Titulo -->
            <a class="navbar-brand" href="#inicio">
                <i class="fas fa-crown" style="color: #f6ff00;"></i>
                Nuestros 15
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#inicio">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#sobre-nosotras">Sobre nosotras</a></li>
                    <li class="nav-item"><a class="nav-link" href="#evento">Evento</a></li>
                    <li class="nav-item"><a class="nav-link" href="#confirmacion">Confirmar</a></li>
                    <li class="nav-item"><a class="nav-link" href="#galeria">Galería</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    {% block content %}
    {% endblock %}

    <!-- Reproductor oculto -->
    <audio id="cancionBailar" style="display: none;">
        <source src="{{ url_for('static', filename='audio/cancion.mp3') }}" type="audio/mpeg">
    </audio>

    <!-- Footer redes sociales -->
    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2026 - Cami y Jime </p>
            <div class="social-icons">
                <a href="#" class="text-white me-3"><i class="fab fa-instagram"></i></a>
                <a href="#" class="text-white me-3"><i class="fab fa-facebook"></i></a>
                <a href="#" class="text-white"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
